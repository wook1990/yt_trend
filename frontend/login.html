<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Trending — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        cream: '#faf9f7', oat: '#dad4c8', 'oat-light': '#f5f4f1',
        ink: '#1a1a1a', 'ink-soft': '#4a4a4a', 'ink-muted': '#888888',
        matcha: '#078a52', slushie: '#3bd3fd', lemon: '#fbbd41',
        ube: '#43089f', pom: '#fc7981',
      }}}
    }
  </script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    [x-cloak] { display: none }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
    .fade-in { animation: fadeUp .3s cubic-bezier(.22,1,.36,1) }
    @keyframes spin { to { transform:rotate(360deg) } }
    .spin { animation: spin 1s linear infinite }

    .clay-card {
      background: white;
      border: 1.5px solid #dad4c8;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
    }
    .clay-input {
      background: white;
      border: 1.5px solid #dad4c8;
      border-radius: 14px;
      color: #1a1a1a;
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .clay-input:focus {
      outline: none;
      border-color: #078a52;
      box-shadow: 0 0 0 3px rgba(7,138,82,.12);
    }
    .clay-input::placeholder { color: #b0aa9e; }
    textarea.clay-input { resize: none; }

    .btn-matcha {
      background: #078a52;
      color: white;
      border: 2px solid #055e38;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 20px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform .15s cubic-bezier(.22,1,.36,1), box-shadow .15s;
    }
    .btn-matcha:hover:not(:disabled) {
      transform: rotateZ(-4deg) translateY(-2px);
      box-shadow: -5px 5px 0 #1a1a1a;
    }
    .btn-matcha:active:not(:disabled) {
      transform: rotateZ(-1deg) translateY(0);
      box-shadow: -2px 2px 0 #1a1a1a;
    }
    .btn-matcha:disabled { opacity: .45; cursor: not-allowed; }

    .tab-pill {
      flex: 1;
      padding: 8px 0;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      transition: background .15s, color .15s;
      border: none;
    }
    .tab-pill.active  { background: #1a1a1a; color: white; }
    .tab-pill.inactive { background: transparent; color: #888; }
    .tab-pill.inactive:hover { background: white; color: #1a1a1a; }
  </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center p-4"
  x-data="authApp()" x-init="init()">

<div class="w-full max-w-sm fade-in">

  <!-- 로고 -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white border-2 border-oat mb-3"
      style="box-shadow:-3px 3px 0 #1a1a1a">
      <span class="text-3xl">📈</span>
    </div>
    <h1 class="text-xl font-extrabold text-ink">YT Trending</h1>
    <p class="text-xs text-ink-muted mt-1">YouTube 트렌드 분석 대시보드</p>
  </div>

  <!-- 카드 -->
  <div class="clay-card p-6">

    <!-- 탭 -->
    <div class="flex bg-oat-light rounded-[14px] p-1 mb-6">
      <button @click="tab='login'"
        :class="tab==='login' ? 'active' : 'inactive'"
        class="tab-pill">로그인</button>
      <button @click="tab='request'"
        :class="tab==='request' ? 'active' : 'inactive'"
        class="tab-pill">가입 요청</button>
    </div>

    <!-- ── 로그인 폼 ── -->
    <div x-show="tab==='login'" class="space-y-3">
      <div>
        <label class="text-xs font-semibold text-ink-soft mb-1.5 block">아이디</label>
        <input x-model="loginForm.username" @keydown.enter="doLogin()"
          type="text" placeholder="username" class="clay-input" />
      </div>
      <div>
        <label class="text-xs font-semibold text-ink-soft mb-1.5 block">비밀번호</label>
        <input x-model="loginForm.password" @keydown.enter="doLogin()"
          type="password" placeholder="••••••••" class="clay-input" />
      </div>

      <div x-show="loginError"
        class="bg-[#fff0f0] border border-pom/40 rounded-xl px-4 py-2.5 text-xs text-[#c0384a]"
        x-text="loginError"></div>

      <button @click="doLogin()" :disabled="loading" class="btn-matcha">
        <span x-show="loading" class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full spin"></span>
        <span x-text="loading ? '로그인 중...' : '로그인'"></span>
      </button>

      <p class="text-center text-xs text-ink-muted pt-1">
        계정이 없으신가요?
        <button @click="tab='request'" class="text-matcha font-semibold hover:underline ml-1">가입 요청하기</button>
      </p>
    </div>

    <!-- ── 가입 요청 폼 ── -->
    <div x-show="tab==='request'" class="space-y-3">
      <div class="bg-[#fffbeb] border border-lemon/60 rounded-xl px-4 py-3 text-xs text-[#854d0e] leading-relaxed">
        ⚠️ 이 서비스는 <strong>초대제 운영</strong>입니다.<br>
        가입 요청을 보내면 관리자 검토 후 승인 시 안내드립니다.
      </div>

      <div>
        <label class="text-xs font-semibold text-ink-soft mb-1.5 block">원하는 아이디</label>
        <input x-model="reqForm.username" type="text" placeholder="username (영문/숫자)" class="clay-input" />
      </div>
      <div>
        <label class="text-xs font-semibold text-ink-soft mb-1.5 block">이메일</label>
        <input x-model="reqForm.email" type="email" placeholder="your@email.com" class="clay-input" />
      </div>
      <div>
        <label class="text-xs font-semibold text-ink-soft mb-1.5 block">
          가입 사유 <span class="text-ink-muted font-normal">(선택)</span>
        </label>
        <textarea x-model="reqForm.reason" placeholder="어떤 목적으로 사용하실지 간단히 적어주세요"
          rows="3" class="clay-input"></textarea>
      </div>

      <div x-show="reqError"
        class="bg-[#fff0f0] border border-pom/40 rounded-xl px-4 py-2.5 text-xs text-[#c0384a]"
        x-text="reqError"></div>
      <div x-show="reqSuccess"
        class="bg-[#f0fdf7] border border-matcha/30 rounded-xl px-4 py-2.5 text-xs text-matcha"
        x-text="reqSuccess"></div>

      <button @click="doRequest()" :disabled="loading || !!reqSuccess" class="btn-matcha">
        <span x-show="loading" class="w-4 h-4 border-2 border-white/40 border-t-white rounded-full spin"></span>
        <span x-text="loading ? '요청 중...' : '가입 요청 보내기'"></span>
      </button>

      <p class="text-center text-xs text-ink-muted pt-1">
        이미 계정이 있으신가요?
        <button @click="tab='login'" class="text-matcha font-semibold hover:underline ml-1">로그인</button>
      </p>
    </div>
  </div>

  <p class="text-center text-[11px] text-ink-muted mt-4">
    Powered by YouTube Data API · Gemini AI
  </p>
</div>

<script>
function authApp() {
  return {
    tab: 'login',
    loading: false,
    loginForm: { username: '', password: '' },
    loginError: '',
    reqForm: { username: '', email: '', reason: '' },
    reqError: '',
    reqSuccess: '',

    init() {
      if (localStorage.getItem('yt_token')) {
        window.location.href = '/'
      }
    },

    async doLogin() {
      this.loginError = ''
      if (!this.loginForm.username || !this.loginForm.password) {
        this.loginError = '아이디와 비밀번호를 입력해주세요.'
        return
      }
      this.loading = true
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.loginForm),
        })
        const data = await r.json()
        if (!r.ok) { this.loginError = data.detail || '로그인 실패'; return }
        localStorage.setItem('yt_token', data.access_token)
        localStorage.setItem('yt_role',  data.role)
        localStorage.setItem('yt_username', data.username)
        window.location.href = '/'
      } catch (e) {
        this.loginError = '서버 연결 실패'
      } finally {
        this.loading = false
      }
    },

    async doRequest() {
      this.reqError = ''; this.reqSuccess = ''
      if (!this.reqForm.username || !this.reqForm.email) {
        this.reqError = '아이디와 이메일은 필수입니다.'
        return
      }
      this.loading = true
      try {
        const r = await fetch('/auth/signup-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.reqForm),
        })
        const data = await r.json()
        if (!r.ok) { this.reqError = data.detail || '요청 실패'; return }
        this.reqSuccess = data.message
        this.reqForm = { username: '', email: '', reason: '' }
      } catch (e) {
        this.reqError = '서버 연결 실패'
      } finally {
        this.loading = false
      }
    },
  }
}
</script>
</body>
</html>
